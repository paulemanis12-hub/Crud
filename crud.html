<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRUD de Tareas</title>

<style>

body{
    font-family: Arial;
    background: linear-gradient(135deg,#ffd6ec,#ffeaf5);
    text-align:center;
}

h1{
    color:#ff4fa3;
}

.caja{
    background:white;
    width:350px;
    margin:auto;
    padding:20px;
    border-radius:20px;
    border:3px solid #ffc1e3;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

input{
    padding:8px;
    width:200px;
    border-radius:10px;
    border:2px solid #ffc1e3;
}

button{
    padding:8px 12px;
    border:none;
    border-radius:10px;
    background:#ff8fcb;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#ff6fb9;
}

.tarea{
    margin-top:10px;
    background:#fff0f7;
    padding:10px;
    border-radius:10px;
    border:2px solid #ffd1ea;
}

.hecha{
    text-decoration: line-through;
    color:gray;
}

.btn-eliminar{
    margin-left:10px;
    background:#ff7abf;
}

</style>
</head>

<body>

<h1>Lista de Tareas</h1>

<div class="caja">

<input type="text" id="texto" placeholder="Nueva tarea">
<button onclick="agregarTarea()">Agregar</button>

<div id="lista"></div>

</div>

<script>

let tareas = JSON.parse(localStorage.getItem("tareas")) || [];

function guardar(){
    localStorage.setItem("tareas", JSON.stringify(tareas));
}

function mostrarTareas(){

    const lista = document.getElementById("lista");
    lista.innerHTML="";

    tareas.forEach((tarea,index)=>{

        const div = document.createElement("div");
        div.className="tarea";

        const check = document.createElement("input");
        check.type="checkbox";
        check.checked=tarea.hecha;

        const span = document.createElement("span");
        span.textContent=" "+tarea.texto;

        if(tarea.hecha){
            span.classList.add("hecha");
        }

        check.onclick=function(){

            tareas[index].hecha = check.checked;

            if(check.checked){
                span.classList.add("hecha");
            }else{
                span.classList.remove("hecha");
            }

            guardar();

        };

        const btn = document.createElement("button");
        btn.textContent="Eliminar";
        btn.className="btn-eliminar";

        btn.onclick=function(){

            tareas.splice(index,1);
            guardar();
            mostrarTareas();

        };

        div.appendChild(check);
        div.appendChild(span);
        div.appendChild(btn);

        lista.appendChild(div);

    });

}

function agregarTarea(){

    const texto = document.getElementById("texto").value;

    if(texto.trim()==="") return;

    tareas.push({
        texto:texto,
        hecha:false
    });

    guardar();
    mostrarTareas();

    document.getElementById("texto").value="";

}

mostrarTareas();

</script>

</body>
</html>

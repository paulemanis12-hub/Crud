<!DOCTYPE html>
<html>
<head>
  <title>CRUD con Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <div id="loginBox">
    <h2>📋 Login
    <input id="email" placeholder="Email" type="email">
    <input id="password" type="password" placeholder="Contraseña">
    <div class="button-group">
      <button onclick="registrar()" class="btn-register">📝 Registrarse</button>
      <button onclick="login()" class="btn-login">🔐 Entrar</button>
    </div>
  </div>

  <div id="tareasBox" style="display:none;">
    <h2>✅ Mis Tareas</h2>
    <div class="add-tarea">
      <input id="tarea" placeholder="Nueva tarea..." autocomplete="off">
      <button onclick="agregar()">➕ Agregar</button>
    </div>
    <ul id="lista"></ul>
    <button onclick="logout()" class="btn-logout">🚪 Cerrar sesión</button>
  </div>
</div>

<script>
if (localStorage.getItem("token")) mostrar();

async function registrar() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  
  const res = await fetch("/api/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });
  const data = await res.json();
  alert(data.mensaje);
  if (res.ok) {
    document.getElementById("email").value = "";
    document.getElementById("password").value = "";
  }
}

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  
  const res = await fetch("/api/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });
  const data = await res.json();
  
  if (data.token) {
    localStorage.setItem("token", data.token);
    mostrar();
  } else {
    alert(data.mensaje);
  }
}

function mostrar() {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("tareasBox").style.display = "block";
  cargar();
}

async function cargar() {
  const token = localStorage.getItem("token");
  const res = await fetch("/api/tareas", {
    headers: { "Authorization": token }
  });
  const data = await res.json();
  const lista = document.getElementById("lista");
  lista.innerHTML = "";
  
  if (data.length === 0) {
    lista.innerHTML = "<li class='empty'>📭 No hay tareas</li>";
    return;
  }
  
  data.forEach(t => {
    lista.innerHTML += `
      <li>
        <span class="${t.completada ? 'completada' : ''}">${t.texto}</span>
        <div class="tarea-buttons">
          <button onclick="completar(${t.id})" class="btn-complete">✅</button>
          <button onclick="editar(${t.id})" class="btn-edit">✏️</button>
          <button onclick="eliminar(${t.id})" class="btn-delete">❌</button>
        </div>
      </li>`;
  });
}

async function agregar() {
  const texto = document.getElementById("tarea").value;
  if (!texto) return;
  
  await fetch("/api/tareas", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": localStorage.getItem("token")
    },
    body: JSON.stringify({ texto })
  });
  document.getElementById("tarea").value = "";
  cargar();
}

async function eliminar(id) {
  if (!confirm("¿Eliminar?")) return;
  await fetch(`/api/tareas/${id}`, {
    method: "DELETE",
    headers: { "Authorization": localStorage.getItem("token") }
  });
  cargar();
}

async function completar(id) {
  await fetch(`/api/tareas/${id}`, {
    method: "PUT",
    headers: { "Authorization": localStorage.getItem("token") }
  });
  cargar();
}

async function editar(id) {
  let texto = prompt("Nuevo texto:");
  if (!texto) return;
  
  await fetch(`/api/tareas/editar/${id}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "Authorization": localStorage.getItem("token")
    },
    body: JSON.stringify({ texto })
  });
  cargar();
}

function logout() {
  localStorage.removeItem("token");
  location.reload();
}
</script>

</body>
</html>
